name: Sync Release Drafts

on:
  push:
    branches: [main]
    paths: ['CHANGELOG.md']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync changelog to releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 .github/scripts/sync_release_drafts.py --full
          else
            python3 .github/scripts/sync_release_drafts.py
          fi
