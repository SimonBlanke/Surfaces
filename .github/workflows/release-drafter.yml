name: Sync Release Draft

on:
  push:
    branches: [main]
    paths: ['CHANGELOG.md']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync unreleased changelog to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/sync_release_drafts.py
